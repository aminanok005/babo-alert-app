<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babo Alert - Quran 7-Clip Generator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-mosque"></i>
                <span>Babo Alert</span>
            </div>
            <div class="header-tagline">เครื่องมือสร้างคลิปอิสลามอัตโนมัติ</div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-quran"></i>
                        <h2>สร้างคลิปใหม่</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label for="verseRef">
                                <i class="fas fa-book-quran"></i>
                                อ้างอิงอายะฮ์/ซูเราะห์
                            </label>
                            <input type="text" id="verseRef" placeholder="เช่น Al-Anbiya 21:1-3 หรือ 2:255" required>
                            <small>กรุณาใส่ชื่อซูเราะห์และอายะฮ์ที่ต้องการ</small>
                        </div>
                        <div class="form-group">
                            <label for="topic">
                                <i class="fas fa-lightbulb"></i>
                                หัวข้อเพิ่มเติม (ไม่บังคับ)
                            </label>
                            <input type="text" id="topic" placeholder="เช่น ความเมตตาของอัลลอฮ์">
                        </div>
                        <button id="generateBtn" class="btn-primary" onclick="generateClips()">
                            <i class="fas fa-play"></i>
                            🎬 Generate 7 คลิป
                        </button>
                    </div>
                </div>
            </section>

            <!-- Progress Section -->
            <section id="progressSection" class="progress-section" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-tasks"></i>
                        <h2>กำลังสร้างคลิป</h2>
                    </div>
                    <div class="card-body">
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div id="progressFill" class="progress-fill"></div>
                            </div>
                            <div id="progressText" class="progress-text">0/7 คลิป</div>
                        </div>
                        
                        <!-- Workflow Steps -->
                        <div id="workflowSteps" class="workflow-steps">
                            <!-- Steps will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section id="resultsSection" class="results-section" style="display: none;">
                <div class="card">
                    <div class="card-header success">
                        <i class="fas fa-check-circle"></i>
                        <h2>คลิปพร้อมใช้งาน</h2>
                    </div>
                    <div class="card-body">
                        <div id="clipsGrid" class="clips-grid">
                            <!-- Clips will be populated by JavaScript -->
                        </div>
                        <button class="btn-secondary" onclick="resetApp()">
                            <i class="fas fa-plus"></i>
                            สร้างคลิปใหม่
                        </button>
                    </div>
                </div>
            </section>

            <!-- Context Viewer Section -->
            <section class="context-section">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-cog"></i>
                        <h2>การตั้งค่า Context</h2>
                    </div>
                    <div class="card-body">
                        <div class="context-tabs">
                            <button class="tab-btn active" onclick="showContext('memory')">
                                <i class="fas fa-brain"></i> Memory
                            </button>
                            <button class="tab-btn" onclick="showContext('knowledge')">
                                <i class="fas fa-book-open"></i> Knowledge
                            </button>
                            <button class="tab-btn" onclick="showContext('skills')">
                                <i class="fas fa-tools"></i> Skills
                            </button>
                        </div>
                        <div class="context-content-wrapper">
                            <pre id="contextContent" class="context-content">กำลังโหลดข้อมูล...</pre>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Powered by <i class="fas fa-heart"></i> Babo Alert | AI Quran Content Generator</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
